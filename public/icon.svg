<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: Deep Navy rounded square -->
  <rect width="512" height="512" rx="96" fill="#1B2A4A"/>

  <!-- Bracket B: vertical stroke + bracket curves -->
  <!-- The "B" is formed by a vertical line on the left with two bracket-style curves
       extending right, resembling tournament bracket connectors -->

  <!-- Vertical stroke of the B -->
  <rect x="128" y="80" width="36" height="352" rx="4" fill="#FFFFFF"/>

  <!-- Top bracket arm (upper half of B) -->
  <path d="M 164 80 L 260 80 Q 340 80 340 160 Q 340 240 260 240 L 164 240"
        fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom bracket arm (lower half of B) -->
  <path d="M 164 240 L 280 240 Q 370 240 370 326 Q 370 412 280 412 L 164 412"
        fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orange accent: small bracket connector marks on the right curves -->
  <!-- Top bracket tick -->
  <rect x="322" y="142" width="40" height="6" rx="3" fill="#E85D26"/>
  <rect x="322" y="152" width="40" height="6" rx="3" fill="#E85D26"/>

  <!-- Bottom bracket tick -->
  <rect x="352" y="308" width="40" height="6" rx="3" fill="#E85D26"/>
  <rect x="352" y="318" width="40" height="6" rx="3" fill="#E85D26"/>

  <!-- Orange basketball detail: small circle at the intersection -->
  <circle cx="164" cy="240" r="16" fill="#E85D26"/>
</svg>
